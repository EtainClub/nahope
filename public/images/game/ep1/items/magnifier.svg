<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <rect width="100" height="100" fill="#2a1f12"/>
  <!-- handle -->
  <line x1="30" y1="70" x2="10" y2="90" stroke="#6b5a2e" stroke-width="8" stroke-linecap="round"/>
  <line x1="30" y1="70" x2="10" y2="90" stroke="#3a2a16" stroke-width="4" stroke-linecap="round"/>
  <!-- glass connection -->
  <circle cx="34" cy="66" r="5" fill="#6b5a2e"/>
  <!-- frame -->
  <circle cx="60" cy="40" r="28" fill="none" stroke="#6b5a2e" stroke-width="4"/>
  <!-- lens shadow/light -->
  <circle cx="60" cy="40" r="25" fill="#a3e635" fill-opacity="0.1"/>
  <circle cx="60" cy="40" r="25" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <path d="M 44 24 A 25 25 0 0 1 76 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
