<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <rect width="100" height="100" fill="#1e291e"/>
  <!-- radio body -->
  <rect x="14" y="24" width="72" height="60" rx="3" fill="#2d3d2d" stroke="#141a14" stroke-width="2.5"/>
  <!-- antenna -->
  <line x1="22" y1="24" x2="22" y2="6" stroke="#2d3d2d" stroke-width="3"/>
  <circle cx="22" cy="5" r="2" fill="#ef4444"/>
  <!-- dial knobs -->
  <circle cx="34" cy="44" r="8" fill="#141a14" stroke="#6b7280" stroke-width="1"/>
  <line x1="34" y1="44" x2="34" y2="38" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="54" cy="44" r="8" fill="#141a14" stroke="#6b7280" stroke-width="1"/>
  <line x1="54" y1="44" x2="58" y2="48" stroke="#ef4444" stroke-width="1.5"/>
  <!-- frequency tuner display -->
  <rect x="24" y="62" width="52" height="14" fill="#0f170f" stroke="#2d3d2d" stroke-width="1.5"/>
  <!-- red glowing channel tuner line -->
  <line x1="62" y1="63" x2="62" y2="75" stroke="#ef4444" stroke-width="2"/>
  <!-- green frequency text -->
  <text x="38" y="72" font-family="monospace" font-size="8" fill="#a3e635" font-weight="bold">88.4</text>
</svg>
