<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <rect width="100" height="100" fill="#0f0707"/>
  <!-- outer shield border -->
  <polygon points="50,6 90,26 90,70 50,94 10,70 10,26" fill="#2d1212" stroke="#ef4444" stroke-width="3"/>
  <!-- inner skull/cross outline -->
  <path d="M 35 30 L 65 30 L 60 55 L 54 55 L 56 68 L 44 68 L 46 55 L 40 55 Z" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <!-- eye holes -->
  <rect x="42" y="38" width="5" height="6" fill="#0f0707"/>
  <rect x="53" y="38" width="5" height="6" fill="#0f0707"/>
  <!-- warning static line -->
  <line x1="20" y1="78" x2="80" y2="78" stroke="#ef4444" stroke-width="2" stroke-dasharray="3 3"/>
  <!-- text -->
  <text x="50" y="86" font-family="monospace" font-size="8" fill="#ef4444" font-weight="bold" text-anchor="middle" letter-spacing="0.5">TRAGEDY</text>
</svg>
