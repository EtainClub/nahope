<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <rect width="100" height="100" fill="#0c1208"/>
  <!-- hexagonal dark frame -->
  <polygon points="50,6 88,28 88,72 50,94 12,72 12,28" fill="#1b2e10" stroke="#a3e635" stroke-width="3"/>
  <!-- Alien/Apostate rune inside -->
  <g stroke="#a3e635" stroke-width="3.5" fill="none" stroke-linecap="round">
    <path d="M 40 40 L 50 32 L 60 40"/>
    <path d="M 50 32 L 50 50"/>
