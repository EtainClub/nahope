    <line x1="36" y1="62" x2="64" y2="62"/>
  </g>
  <!-- text -->
  <text x="50" y="84" font-family="monospace" font-size="8" fill="#a3e635" font-weight="bold" text-anchor="middle" letter-spacing="1">APOSTATE</text>
</svg>
